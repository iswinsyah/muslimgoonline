<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MCS Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 md:p-12">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-[#2845D6] tracking-tighter italic">MCS MASTER</h1>
            <p class="text-sm text-slate-500 mt-1">Selamat Datang Kembali</p>
        </div>
        <form id="login-form" class="space-y-5">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Username</label>
                <input type="text" name="username" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-[#2845D6]">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Password</label>
                <div class="relative">
                    <input type="password" name="password" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-[#2845D6] pr-10">
                    <button type="button" class="toggle-password-btn absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-[#2845D6] focus:outline-none mt-1"><i data-lucide="eye" class="w-5 h-5 icon-eye"></i><i data-lucide="eye-off" class="w-5 h-5 icon-eye-slash hidden"></i></button>
                </div>
            </div>
            <div class="pt-4">
                <button type="submit" id="btn-login" class="w-full py-4 bg-[#2845D6] text-white rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-blue-700 transition-all active:scale-95">
                    Login
                </button>
            </div>
        </form>
        <div class="text-center mt-6">
            <a href="signup.html" class="text-xs text-slate-500 hover:text-[#2845D6] font-bold">Belum punya akun? Daftar di sini</a>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <script src="assets/js/toggle_password.js"></script>
    <script type="module" src="assets/js/login.js"></script>
</body>
</html>
